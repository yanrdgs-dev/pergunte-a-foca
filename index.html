<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunte à Foca</title>
</head>
<body>
    <h1>Pergunte à Foca</h1>
    <img src="./img/foca.png" alt="Foca Mágica" width="300">
    <div class="input-box">
        <input type="text" class="input1"> ou <input type="text" class="input2">
        <button type="button" onclick="escolher()" class="submit">Enviar</button>
    </div>
</body>

<style>
    button {
        background-color:darkcyan;
        color: white;
    }

    body {
        background-color: lightslategray;
        font-family: Helvetica, sans-serif;
    }

    .input-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    img {
        display: block;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
    }

</style>
<script>
    function escolher() {
        var escolha = Math.floor(Math.random() * 10);

        if (escolha % 2) {
            alert("A foca escolheu " + document.querySelector(".input1").value);
        } else {
            alert("A foca escolheu " + document.querySelector(".input2").value);
        }
    }
</script>
</html>
